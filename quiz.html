<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <style>
        body {font-family: Arial, sans-serif;}
        .quiz-container {max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px;}
        .question {margin: 20px 0;}
        .options {list-style: none; padding: 0;}
        .options li {margin: 10px 0;}
        .result {margin-top: 20px;}
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>Quiz</h1>
        <div class="question">
            <p>1. What is the capital of France?</p>
            <ul class="options">
                <li><input type="radio" name="q1" value="A"> A) Paris</li>
                <li><input type="radio" name="q1" value="B"> B) London</li>
                <li><input type="radio" name="q1" value="C"> C) Berlin</li>
                <li><input type="radio" name="q1" value="D"> D) Madrid</li>
            </ul>
        </div>
        <button onclick="submitQuiz()">Submit</button>
        <div class="result"></div>
    </div>
    <footer style="font-size: 7px;">
        <p>MIT License</p>
    </footer>
    <script>
        function submitQuiz() {
            const resultDiv = document.querySelector('.result');
            const selectedOption = document.querySelector('input[name="q1":checked');
            if (selectedOption) {
                if (selectedOption.value === 'A') {
                    resultDiv.innerHTML = "Correct! The capital of France is Paris.";
                } else {
                    resultDiv.innerHTML = "Incorrect. The correct answer is A) Paris.";
                }
            } else {
                resultDiv.innerHTML = "Please select an option.";
            }
        }
    </script>
</body>
</html>
